<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — DevSystem PRIME</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-body">
  <div class="login-wrap">
    <!-- Painel da marca (recriado em código) -->
    <div class="login-side">
      <svg class="login-side__s" viewBox="0 0 212 212" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" preserveAspectRatio="xMidYMid meet"><path d="M 77.0 23.0 C 66.0 24.8 52.0 32.0 46.0 40.0 C 40.0 48.0 39.0 62.3 41.0 71.0 C 43.0 79.7 47.2 85.2 58.0 92.0 C 68.8 98.8 96.5 106.8 106.0 112.0 C 115.5 117.2 113.5 118.8 115.0 123.0 C 116.5 127.2 117.5 132.5 115.0 137.0 C 112.5 141.5 106.3 147.3 100.0 150.0 C 93.7 152.7 84.3 154.5 77.0 153.0 C 69.7 151.5 60.7 146.2 56.0 141.0 C 51.3 135.8 51.7 125.0 49.0 122.0 C 46.3 119.0 42.0 121.0 40.0 123.0 C 38.0 125.0 34.8 127.8 37.0 134.0 C 39.2 140.2 43.8 154.3 53.0 160.0 C 62.2 165.7 80.5 169.0 92.0 168.0 C 103.5 167.0 115.5 161.5 122.0 154.0 C 128.5 146.5 132.2 132.2 131.0 123.0 C 129.8 113.8 126.3 106.8 115.0 99.0 C 103.7 91.2 72.8 83.5 63.0 76.0 C 53.2 68.5 55.3 59.7 56.0 54.0 C 56.7 48.3 62.7 44.7 67.0 42.0 C 71.3 39.3 76.0 38.0 82.0 38.0 C 88.0 38.0 97.2 37.5 103.0 42.0 C 108.8 46.5 112.8 63.0 117.0 65.0 C 121.2 67.0 128.8 60.0 128.0 54.0 C 127.2 48.0 120.5 34.2 112.0 29.0 C 103.5 23.8 88.0 21.2 77.0 23.0 Z"/></svg>
      <div class="login-side__brand">
        <div class="login-brand__nome">Dev<span>System</span></div>
        <span class="login-brand__prime">PRIME</span>
        <p class="login-brand__tag">Seu negócio, nosso sistema</p>
        <div class="login-brand__bar"></div>
        <p class="login-brand__desc">Sistema completo e moderno para gestão eficiente do seu negócio. Simples, rápido e inteligente.</p>
      </div>
    </div>

    <!-- Formulário -->
    <div class="login-form-side">
      <div class="login-card">
        <h1>Bem-vindo de volta</h1>
        <p class="login-sub">Entre com suas credenciais para continuar</p>

        <form id="form-login" autocomplete="on">
          <div class="field">
            <label>E-mail</label>
            <input class="login-input" type="email" name="email" placeholder="voce@empresa.com" required>
          </div>
          <div class="field">
            <label>Senha</label>
            <div class="login-inp">
              <input class="login-input" type="password" name="senha" placeholder="••••••••" required>
              <button type="button" class="login-eye" onclick="toggleSenha(this)"><i class="fa-solid fa-eye"></i></button>
            </div>
          </div>
          <div class="login-row">
            <label class="login-check">
              <input type="checkbox" name="lembrar"> Lembrar acesso
            </label>
            <a href="#" onclick="esqueciSenha(event)">Esqueci a senha</a>
          </div>
          <button type="submit" class="login-btn" id="btn-entrar">
            <i class="fa-solid fa-right-to-bracket"></i> Entrar
          </button>
        </form>

        <div class="login-hint">Acesso de teste: <b>admin@oficina.com</b> / <b>admin123</b></div>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script src="/static/js/login.js"></script>
</body>
</html>
