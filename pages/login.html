<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — DevSystem PRIME</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-body">
  <div class="login-wrap">
    <!-- Painel da marca (recriado em código) -->
    <div class="login-side">
      <svg class="login-side__s" viewBox="0 0 300 380" aria-hidden="true" preserveAspectRatio="xMidYMid meet"><path d="M 208 96 C 208 50, 118 42, 80 82 C 42 122, 72 168, 152 192 C 232 216, 258 264, 220 302 C 182 340, 96 332, 96 288" fill="none" stroke="currentColor" stroke-width="56" stroke-linecap="round"/><circle cx="236" cy="116" r="26" fill="currentColor"/></svg>
      <div class="login-side__brand">
        <div class="login-brand__nome">Dev<span>System</span></div>
        <span class="login-brand__prime">PRIME</span>
        <p class="login-brand__tag">Seu negócio, nosso sistema</p>
        <div class="login-brand__bar"></div>
        <p class="login-brand__desc">Sistema completo e moderno para gestão eficiente do seu negócio. Simples, rápido e inteligente.</p>
      </div>
    </div>

    <!-- Formulário -->
    <div class="login-form-side">
      <div class="login-card">
        <h1>Bem-vindo de volta</h1>
        <p class="login-sub">Entre com suas credenciais para continuar</p>

        <form id="form-login" autocomplete="on">
          <div class="field">
            <label>E-mail</label>
            <input class="login-input" type="email" name="email" placeholder="voce@empresa.com" required>
          </div>
          <div class="field">
            <label>Senha</label>
            <div class="login-inp">
              <input class="login-input" type="password" name="senha" placeholder="••••••••" required>
              <button type="button" class="login-eye" onclick="toggleSenha(this)"><i class="fa-solid fa-eye"></i></button>
            </div>
          </div>
          <div class="login-row">
            <label class="login-check">
              <input type="checkbox" name="lembrar"> Lembrar acesso
            </label>
            <a href="#" onclick="esqueciSenha(event)">Esqueci a senha</a>
          </div>
          <button type="submit" class="login-btn" id="btn-entrar">
            <i class="fa-solid fa-right-to-bracket"></i> Entrar
          </button>
        </form>

        <div class="login-hint">Acesso de teste: <b>admin@oficina.com</b> / <b>admin123</b></div>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script src="/static/js/login.js"></script>
</body>
</html>
